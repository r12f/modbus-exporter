services:
  modbus-simulator:
    image: oitc/modbus-server
    volumes:
      - ./config/modbus-simulator.json:/etc/modbus/config.json:ro
    ports:
      - "5020:5020"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.connect((\"localhost\", 5020)); s.close()'"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  otel-modbus-exporter:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Debug: config file ===" &&
        ls -la /etc/otel-modbus-exporter/ &&
        cat /etc/otel-modbus-exporter/config.yaml | head -5 &&
        echo "=== Debug: binary ===" &&
        ls -la /usr/local/bin/otel-modbus-exporter &&
        echo "=== Debug: starting ===" &&
        exec /usr/local/bin/otel-modbus-exporter --config /etc/otel-modbus-exporter/config.yaml
    volumes:
      - ./config/test.yaml:/etc/otel-modbus-exporter/config.yaml:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/metrics || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 10
    depends_on:
      modbus-simulator:
        condition: service_healthy
